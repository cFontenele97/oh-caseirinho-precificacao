document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?

            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

frames ca-fade{from{opacity:0}to{opacity:1}}\n    @keyframes ca-toast{0%{opacity:0;transform:translate(-50%,12px)}12%{opacity:1;transform:translate(-50%,0)}88%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,8px)}}\n    @keyframes ca-pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n    @keyframes ca-blink{0%,80%,100%{opacity:.25}40%{opacity:1}}\n    .ca-scroll::-webkit-scrollbar{width:0}\n  <\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"max-width:440px;margin:0 auto;min-height:100vh;background:#FBEEF3;font-family:Nunito,sans-serif;color:#33262D;position:relative;overflow:hidden;box-shadow:0 0 60px rgba(120,30,70,.12)\">\n\n  <!-- HEADER -->\n  <header style=\"background:#fff;padding:14px 18px 12px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid #F4E2EA;position:sticky;top:0;z-index:20\">\n    <img src=\"4aeb213d-30d5-4d67-833e-7b22685e5695\" alt=\"Camila Ayana\" style=\"height:42px;width:auto;object-fit:contain\">\n  <\u002Fheader>\n\n  <main class=\"ca-scroll\" style=\"padding:18px 16px 120px;min-height:calc(100vh - 70px)\">\n\n    <!-- ===================== PRECIFICAR ===================== -->\n    <sc-if value=\"{{ isPrec }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"animation:ca-fade .25s ease\">\n\n      <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin:2px 2px 14px\">\n        <div>\n          <div style=\"font-family:Poppins;font-weight:700;font-size:22px;letter-spacing:-.3px\">Precificar receita<\u002Fdiv>\n          <div style=\"font-size:13px;color:#9B8590;margin-top:1px\">Monte sua ficha e descubra o preço justo<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ onNovaReceita }}\" style=\"background:#FCE3EC;color:#C0286B;border:none;border-radius:11px;padding:8px 12px;font-size:12.5px;font-weight:700;font-family:Poppins;cursor:pointer\">＋ Nova<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- Produto -->\n      <div style=\"background:#fff;border:1px solid #F6E2EA;border-radius:18px;padding:14px;box-shadow:0 2px 10px rgba(192,40,107,.05);margin-bottom:14px\">\n        <label style=\"font-size:12px;font-weight:700;color:#B98AA1;text-transform:uppercase;letter-spacing:.5px\">Produto<\u002Flabel>\n        <input value=\"{{ recNome }}\" oninput=\"{{ onNome }}\" placeholder=\"Ex: Bolo de cenoura\" style=\"width:100%;border:none;border-bottom:1.5px solid #F1D7E2;padding:7px 2px 9px;font-size:18px;font-weight:700;font-family:Poppins;color:#33262D;background:transparent;margin-top:4px\">\n        <label style=\"font-size:12px;font-weight:700;color:#B98AA1;text-transform:uppercase;letter-spacing:.5px;display:block;margin-top:14px\">Descrição do rendimento (opcional)<\u002Flabel>\n        <input value=\"{{ recRendimento }}\" oninput=\"{{ onRendimento }}\" placeholder=\"Ex: 1 bolo de 1,5kg / 12 fatias\" style=\"width:100%;border:none;border-bottom:1.5px solid #F1D7E2;padding:7px 2px 9px;font-size:15px;font-weight:600;color:#33262D;background:transparent;margin-top:4px\">\n      <\u002Fdiv>\n\n      <!-- Partes -->\n      <sc-for list=\"{{ partes }}\" as=\"parte\" hint-placeholder-count=\"2\">\n        <div style=\"background:#fff;border:1px solid #F6E2EA;border-radius:18px;padding:14px;box-shadow:0 2px 10px rgba(192,40,107,.05);margin-bottom:12px\">\n          <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px\">\n            <span style=\"width:9px;height:9px;border-radius:50%;background:#E24A8B;flex:none\"><\u002Fspan>\n            <input value=\"{{ parte.nome }}\" oninput=\"{{ parte.onName }}\" placeholder=\"Nome da parte\" style=\"flex:1;border:none;font-size:15.5px;font-weight:700;font-family:Poppins;color:#33262D;background:transparent;min-width:0\">\n            <sc-if value=\"{{ parte.canDelete }}\" hint-placeholder-val=\"{{ true }}\">\n              <button onclick=\"{{ parte.onDelete }}\" aria-label=\"remover parte\" style=\"background:none;border:none;color:#D6AEC0;cursor:pointer;font-size:17px;padding:2px 4px\">✕<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n\n          <sc-for list=\"{{ parte.insumos }}\" as=\"ins\" hint-placeholder-count=\"3\">\n            <div onclick=\"{{ ins.onEdit }}\" style=\"display:flex;align-items:center;gap:10px;padding:9px 6px;border-top:1px solid #F7EAF0;cursor:pointer\">\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:14.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ ins.nome }}<\u002Fdiv>\n                <div style=\"font-size:12px;color:#A7919C;margin-top:1px\">{{ ins.detalhe }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"font-size:14.5px;font-weight:800;color:#C0286B;font-family:Poppins\">{{ ins.custoFmt }}<\u002Fdiv>\n              <button onclick=\"{{ ins.onDelete }}\" aria-label=\"remover\" style=\"background:none;border:none;color:#E0BACB;cursor:pointer;font-size:15px;padding:2px 2px 2px 4px\">✕<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <div style=\"display:flex;align-items:center;justify-content:space-between;border-top:1.5px solid #F1D7E2;margin-top:4px;padding:10px 6px 2px\">\n            <button onclick=\"{{ parte.onAddInsumo }}\" style=\"background:#FCE3EC;color:#C0286B;border:none;border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;font-family:Poppins;cursor:pointer\">＋ Insumo<\u002Fbutton>\n            <div style=\"text-align:right\">\n              <span style=\"font-size:11.5px;color:#A7919C;font-weight:600\">subtotal<\u002Fspan>\n              <span style=\"font-size:15px;font-weight:800;color:#33262D;font-family:Poppins;margin-left:7px\">{{ parte.subtotalFmt }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <button onclick=\"{{ onAddParte }}\" style=\"width:100%;background:transparent;color:#C0286B;border:1.5px dashed #E7B9CE;border-radius:14px;padding:12px;font-size:13.5px;font-weight:700;font-family:Poppins;cursor:pointer;margin-bottom:18px\">＋ Adicionar parte (recheio, calda…)<\u002Fbutton>\n\n      <!-- Custo dos insumos -->\n      <div style=\"background:linear-gradient(135deg,#FCE3EC,#FBD6E5);border-radius:18px;padding:15px 17px;display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n        <div>\n          <div style=\"font-size:12.5px;font-weight:700;color:#B5658C;text-transform:uppercase;letter-spacing:.6px\">Custo dos insumos<\u002Fdiv>\n          <div style=\"font-size:12px;color:#B98AA1;margin-top:2px\">soma de todos os ingredientes<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:26px;font-weight:800;color:#A81E5E;font-family:Poppins;letter-spacing:-.5px\">{{ custoInsumosFmt }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Tempo & rendimento -->\n      <div style=\"background:#fff;border:1px solid #F6E2EA;border-radius:18px;padding:15px;box-shadow:0 2px 10px rgba(192,40,107,.05);margin-bottom:14px\">\n        <div style=\"display:flex;gap:11px\">\n          <div style=\"flex:1 1 0;min-width:0\">\n            <label style=\"font-size:11.5px;font-weight:700;color:#B98AA1;text-transform:uppercase;letter-spacing:.4px\">Tempo de preparo<\u002Flabel>\n            <div style=\"display:flex;align-items:center;border:1.5px solid #F1D7E2;border-radius:12px;padding:0 12px;margin-top:6px\">\n              <input value=\"{{ tempoMin }}\" oninput=\"{{ onTempo }}\" inputmode=\"numeric\" placeholder=\"30\" style=\"flex:1 1 0;width:100%;border:none;padding:11px 4px;font-size:16px;font-weight:800;font-family:Poppins;min-width:0;background:transparent\">\n              <span style=\"font-size:12.5px;font-weight:700;color:#B98AA1;flex:none\">min<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1 1 0;min-width:0\">\n            <label style=\"font-size:11.5px;font-weight:700;color:#B98AA1;text-transform:uppercase;letter-spacing:.4px\">Rende<\u002Flabel>\n            <div style=\"display:flex;align-items:center;border:1.5px solid #F1D7E2;border-radius:12px;padding:0 12px;margin-top:6px\">\n              <input value=\"{{ rendimentoQtd }}\" oninput=\"{{ onRendQtd }}\" inputmode=\"numeric\" placeholder=\"10\" style=\"flex:1 1 0;width:100%;border:none;padding:11px 4px;font-size:16px;font-weight:800;font-family:Poppins;min-width:0;background:transparent\">\n              <span style=\"font-size:12.5px;font-weight:700;color:#B98AA1;flex:none\">und<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Ficha técnica -->\n      <div style=\"background:#fff;border:1px solid #F6E2EA;border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(192,40,107,.05);margin-bottom:14px\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:11px\">\n          <div style=\"font-family:Poppins;font-weight:700;font-size:15px\">Ficha técnica<\u002Fdiv>\n          <button onclick=\"{{ goAjustesFromFicha }}\" style=\"background:none;border:none;color:#C0286B;font-size:12px;font-weight:700;font-family:Poppins;cursor:pointer;padding:0\">⚙ Ajustes<\u002Fbutton>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:7px 0\">\n          <span style=\"font-size:14px;font-weight:600;color:#6E5862\">Custo dos insumos<\u002Fspan>\n          <span style=\"font-size:14.5px;font-weight:800;font-family:Poppins;color:#5C4651\">{{ custoInsumosFmt }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-top:1px solid #F7EAF0\">\n          <span style=\"display:flex;align-items:center;gap:7px;font-size:14px;font-weight:600;color:#6E5862\">Custo operacional\n            <span style=\"display:inline-flex;align-items:center;background:#FBF1F6;border:1px solid #F1D7E2;border-radius:8px;padding:2px 4px 2px 7px\">\n              <input value=\"{{ operacionalPct }}\" oninput=\"{{ onOperacional }}\" inputmode=\"decimal\" style=\"width:30px;border:none;background:transparent;font-size:13px;font-weight:800;font-family:Poppins;color:#C0286B;text-align:right\"><span style=\"font-size:12px;font-weight:800;color:#C0286B\">%<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fspan>\n          <span style=\"font-size:14.5px;font-weight:800;font-family:Poppins;color:#5C4651\">{{ custoFixoFmt }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-top:1px solid #F7EAF0\">\n          <span style=\"font-size:14px;font-weight:600;color:#6E5862\">Mão de obra <span style=\"font-size:12px;color:#A7919C\">({{ tempoMinLabel }} min)<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:14.5px;font-weight:800;font-family:Poppins;color:#5C4651\">{{ maoObraFmt }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px 0;margin-top:3px;border-top:1.5px solid #F1D7E2\">\n          <span style=\"font-size:14.5px;font-weight:800;color:#33262D;font-family:Poppins\">Custo total<\u002Fspan>\n          <span style=\"font-size:17px;font-weight:800;font-family:Poppins;color:#A81E5E\">{{ custoTotalRecFmt }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-top:1px solid #F7EAF0\">\n          <span style=\"display:flex;align-items:center;gap:7px;font-size:14px;font-weight:600;color:#6E5862\">Lucro\n            <span style=\"display:inline-flex;align-items:center;background:#FBF1F6;border:1px solid #F1D7E2;border-radius:8px;padding:2px 4px 2px 7px\">\n              <input value=\"{{ lucroPct }}\" oninput=\"{{ onLucro }}\" inputmode=\"decimal\" style=\"width:30px;border:none;background:transparent;font-size:13px;font-weight:800;font-family:Poppins;color:#C0286B;text-align:right\"><span style=\"font-size:12px;font-weight:800;color:#C0286B\">%<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fspan>\n          <span style=\"font-size:14.5px;font-weight:800;font-family:Poppins;color:#2E9E6B\">+ {{ lucroValorFmt }}<\u002Fspan>\n        <\u002Fdiv>\n\n        <div style=\"background:linear-gradient(135deg,#E24A8B,#C0286B);border-radius:14px;padding:14px 16px;margin-top:12px;display:flex;align-items:center;justify-content:space-between\">\n          <div>\n            <div style=\"font-size:12px;font-weight:700;color:#FBD6E5;text-transform:uppercase;letter-spacing:.5px\">Valor final da receita<\u002Fdiv>\n            <div style=\"font-size:12px;color:#F3C0D6;margin-top:2px\">{{ rendimentoLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:26px;font-weight:800;color:#fff;font-family:Poppins;letter-spacing:-.5px\">{{ valorFinalFmt }}<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;background:#FCE3EC;border-radius:12px;padding:11px 15px;margin-top:9px\">\n          <span style=\"font-size:13.5px;font-weight:800;color:#B5658C\">Preço por unidade<\u002Fspan>\n          <span style=\"font-size:21px;font-weight:800;color:#E24A8B;font-family:Poppins\">{{ valorUnidadeFmt }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- iFood -->\n      <sc-if value=\"{{ mostrarIfood }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"background:#fff;border:1px solid #F6E2EA;border-radius:18px;padding:15px;box-shadow:0 2px 10px rgba(192,40,107,.05);margin-bottom:18px\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:3px\">\n          <span style=\"width:10px;height:10px;border-radius:50%;background:#EA3A2E;flex:none\"><\u002Fspan>\n          <div style=\"font-family:Poppins;font-weight:700;font-size:15px\">Preço da unidade no iFood<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#9B8590;margin-bottom:12px\">O app cobra uma taxa. Para não perder dinheiro, o preço sobe automaticamente. Já vem com o padrão dos Ajustes — ajuste se quiser.<\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;background:#FBF1F6;border-radius:12px;padding:9px 12px\">\n          <span style=\"font-size:12.5px;font-weight:700;color:#B98AA1\">Taxa do app<\u002Fspan>\n          <input value=\"{{ taxaInput }}\" oninput=\"{{ onTaxa }}\" inputmode=\"decimal\" style=\"flex:1;border:none;background:transparent;font-size:15px;font-weight:800;font-family:Poppins;color:#33262D;text-align:right\">\n          <span style=\"font-size:15px;font-weight:800;color:#C0286B;font-family:Poppins\">%<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:13px;border-top:1.5px solid #F1D7E2\">\n          <div style=\"font-size:13.5px;font-weight:800;color:#5C4651\">Unidade no iFood<\u002Fdiv>\n          <div style=\"font-size:24px;font-weight:800;color:#EA3A2E;font-family:Poppins;letter-spacing:-.5px\">{{ precoIfoodFmt }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Ações -->\n      <button onclick=\"{{ onSalvar }}\" style=\"width:100%;background:#E24A8B;color:#fff;border:none;border-radius:15px;padding:15px;font-size:15.5px;font-weight:700;font-family:Poppins;cursor:pointer;box-shadow:0 8px 20px rgba(226,74,139,.32);margin-bottom:10px\" style-active=\"transform:scale(.985)\">Salvar receita<\u002Fbutton>\n      <button onclick=\"{{ onBaixarPdf }}\" style=\"width:100%;background:#fff;color:#C0286B;border:1.5px solid #E7B9CE;border-radius:15px;padding:14px;font-size:15px;font-weight:700;font-family:Poppins;cursor:pointer\">⬇ Baixar PDF da ficha<\u002Fbutton>\n\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== AJUSTES ===================== -->\n    <sc-if value=\"{{ isAjustes }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:ca-fade .25s ease\">\n      <div style=\"margin:2px 2px 16px\">\n        <div style=\"font-family:Poppins;font-weight:700;font-size:22px;letter-spacing:-.3px\">Ajustes<\u002Fdiv>\n        <div style=\"font-size:13px;color:#9B8590;margin-top:1px\">Configure uma vez — usamos em todas as receitas<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Mão de obra -->\n      <div style=\"background:#fff;border:1px solid #F6E2EA;border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(192,40,107,.05);margin-bottom:14px\">\n        <div style=\"font-family:Poppins;font-weight:700;font-size:15px;margin-bottom:3px\">Quanto vale o meu tempo<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#9B8590;margin-bottom:14px\">Isso calcula sua mão de obra por minuto de receita.<\u002Fdiv>\n\n        <label style=\"font-size:11.5px;font-weight:700;color:#B98AA1;text-transform:uppercase;letter-spacing:.4px\">Quanto quero ganhar por mês<\u002Flabel>\n        <div style=\"display:flex;align-items:center;border:1.5px solid #F1D7E2;border-radius:12px;padding:0 12px;margin:6px 0 13px\">\n          <span style=\"font-size:14px;font-weight:700;color:#B98AA1\">R$<\u002Fspan>\n          <input value=\"{{ cfgSalario }}\" oninput=\"{{ onCfgSalario }}\" inputmode=\"decimal\" placeholder=\"1.800,00\" style=\"flex:1;border:none;padding:11px 6px;font-size:16px;font-weight:800;font-family:Poppins;min-width:0;background:transparent\">\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:11px;margin-bottom:13px\">\n          <div style=\"flex:1\">\n            <label style=\"font-size:11.5px;font-weight:700;color:#B98AA1;text-transform:uppercase;letter-spacing:.4px\">Dias / mês<\u002Flabel>\n            <input value=\"{{ cfgDias }}\" oninput=\"{{ onCfgDias }}\" inputmode=\"numeric\" placeholder=\"24\" style=\"width:100%;border:1.5px solid #F1D7E2;border-radius:12px;padding:11px 13px;font-size:16px;font-weight:800;font-family:Poppins;margin-top:6px\">\n          <\u002Fdiv>\n          <div style=\"flex:1\">\n            <label style=\"font-size:11.5px;font-weight:700;color:#B98AA1;text-transform:uppercase;letter-spacing:.4px\">Horas / dia<\u002Flabel>\n            <input value=\"{{ cfgHoras }}\" oninput=\"{{ onCfgHoras }}\" inputmode=\"numeric\" placeholder=\"8\" style=\"width:100%;border:1.5px solid #F1D7E2;border-radius:12px;padding:11px 13px;font-size:16px;font-weight:800;font-family:Poppins;margin-top:6px\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#FBF1F6;border-radius:13px;padding:12px 14px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:3px 0\">\n            <span style=\"font-size:13px;font-weight:600;color:#8A6E7B\">Seu dia vale<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:800;font-family:Poppins;color:#5C4651\">{{ valorDiaFmt }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:3px 0\">\n            <span style=\"font-size:13px;font-weight:600;color:#8A6E7B\">Sua hora vale<\u002Fspan>\n            <span style=\"font-size:14px;font-weight:800;font-family:Poppins;color:#5C4651\">{{ valorHoraFmt }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:6px 0 2px;margin-top:4px;border-top:1px solid #EFD7E2\">\n            <span style=\"font-size:13.5px;font-weight:800;color:#B5658C\">Seu minuto vale<\u002Fspan>\n            <span style=\"font-size:18px;font-weight:800;font-family:Poppins;color:#C0286B\">{{ valorMinutoFmt }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Percentuais padrão -->\n      <div style=\"background:#fff;border:1px solid #F6E2EA;border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(192,40,107,.05);margin-bottom:14px\">\n        <div style=\"font-family:Poppins;font-weight:700;font-size:15px;margin-bottom:3px\">Percentuais padrão<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#9B8590;margin-bottom:14px\">Já entram preenchidos em cada receita (e dá pra mudar lá também).<\u002Fdiv>\n\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 0\">\n          <div>\n            <div style=\"font-size:14px;font-weight:700;color:#5C4651\">Custo operacional<\u002Fdiv>\n            <div style=\"font-size:12px;color:#A7919C\">gás, luz, água, aluguel…<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;border:1.5px solid #F1D7E2;border-radius:11px;padding:0 10px;width:92px\">\n            <input value=\"{{ operacionalPct }}\" oninput=\"{{ onOperacional }}\" inputmode=\"decimal\" style=\"flex:1;border:none;background:transparent;font-size:16px;font-weight:800;font-family:Poppins;color:#C0286B;text-align:right;min-width:0;padding:9px 4px\">\n            <span style=\"font-size:14px;font-weight:800;color:#C0286B;font-family:Poppins\">%<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid #F7EAF0\">\n          <div>\n            <div style=\"font-size:14px;font-weight:700;color:#5C4651\">Lucro<\u002Fdiv>\n            <div style=\"font-size:12px;color:#A7919C\">o seu ganho sobre o custo total<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;border:1.5px solid #F1D7E2;border-radius:11px;padding:0 10px;width:92px\">\n            <input value=\"{{ lucroPct }}\" oninput=\"{{ onLucro }}\" inputmode=\"decimal\" style=\"flex:1;border:none;background:transparent;font-size:16px;font-weight:800;font-family:Poppins;color:#C0286B;text-align:right;min-width:0;padding:9px 4px\">\n            <span style=\"font-size:14px;font-weight:800;color:#C0286B;font-family:Poppins\">%<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Taxa iFood padrão -->\n      <div style=\"background:#fff;border:1px solid #F6E2EA;border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(192,40,107,.05);margin-bottom:14px\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:3px\">\n          <span style=\"width:10px;height:10px;border-radius:50%;background:#EA3A2E;flex:none\"><\u002Fspan>\n          <div style=\"font-family:Poppins;font-weight:700;font-size:15px\">Taxa padrão do iFood<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#9B8590;margin-bottom:13px\">Já vem preenchida em cada receita — e dá pra mudar na hora de precificar.<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:11px\">\n          <sc-for list=\"{{ cfgTaxasRapidas }}\" as=\"t\" hint-placeholder-count=\"5\">\n            <button onclick=\"{{ t.onPick }}\" style=\"border:1.5px solid {{ t.border }};background:{{ t.bg }};color:{{ t.color }};border-radius:11px;padding:7px 11px;font-size:13px;font-weight:800;font-family:Poppins;cursor:pointer\">{{ t.label }}%<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:10px;background:#FBF1F6;border-radius:12px;padding:9px 12px\">\n          <span style=\"font-size:12.5px;font-weight:700;color:#B98AA1\">Taxa do app<\u002Fspan>\n          <input value=\"{{ cfgTaxaIfood }}\" oninput=\"{{ onCfgTaxaIfood }}\" inputmode=\"decimal\" style=\"flex:1;border:none;background:transparent;font-size:15px;font-weight:800;font-family:Poppins;color:#33262D;text-align:right\">\n          <span style=\"font-size:15px;font-weight:800;color:#C0286B;font-family:Poppins\">%<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"text-align:center;font-size:12px;color:#B98AA1;padding:4px 10px 8px\">Tudo é salvo automaticamente neste aparelho. ✓<\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== HISTÓRICO ===================== -->\n    <sc-if value=\"{{ isHist }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:ca-fade .25s ease\">\n      <div style=\"margin:2px 2px 16px\">\n        <div style=\"font-family:Poppins;font-weight:700;font-size:22px;letter-spacing:-.3px\">Minhas receitas<\u002Fdiv>\n        <div style=\"font-size:13px;color:#9B8590;margin-top:1px\">{{ histSubtitulo }}<\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ histVazio }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:60px 24px;color:#B98AA1\">\n          <div style=\"width:74px;height:74px;border-radius:50%;background:#FCE3EC;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:32px\">🧁<\u002Fdiv>\n          <div style=\"font-family:Poppins;font-weight:700;font-size:16px;color:#8A6E7B\">Nenhuma receita salva ainda<\u002Fdiv>\n          <div style=\"font-size:13.5px;margin-top:5px;line-height:1.5\">Monte sua primeira ficha na aba<br><b style=\"color:#C0286B\">Precificar<\u002Fb> e toque em Salvar.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-for list=\"{{ historico }}\" as=\"h\" hint-placeholder-count=\"0\">\n        <div style=\"background:#fff;border:1px solid #F6E2EA;border-radius:18px;padding:15px;box-shadow:0 2px 10px rgba(192,40,107,.05);margin-bottom:12px\">\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px\">\n            <div style=\"min-width:0\">\n              <div style=\"font-family:Poppins;font-weight:700;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ h.nome }}<\u002Fdiv>\n              <div style=\"font-size:12px;color:#A7919C;margin-top:2px\">{{ h.meta }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ h.onDelete }}\" aria-label=\"excluir\" style=\"background:none;border:none;color:#D6AEC0;cursor:pointer;font-size:16px;padding:2px 2px;flex:none\">🗑<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:9px;margin-top:13px\">\n            <div style=\"flex:1;background:#FBF1F6;border-radius:12px;padding:9px 11px\">\n              <div style=\"font-size:10.5px;font-weight:700;color:#B98AA1;text-transform:uppercase;letter-spacing:.4px\">Custo<\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:800;font-family:Poppins;color:#5C4651;margin-top:2px\">{{ h.custoFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;background:#FCE3EC;border-radius:12px;padding:9px 11px\">\n              <div style=\"font-size:10.5px;font-weight:700;color:#B5658C;text-transform:uppercase;letter-spacing:.4px\">Unidade<\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:800;font-family:Poppins;color:#E24A8B;margin-top:2px\">{{ h.unidadeFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;background:#FDEDEC;border-radius:12px;padding:9px 11px\">\n              <div style=\"font-size:10.5px;font-weight:700;color:#D06A60;text-transform:uppercase;letter-spacing:.4px\">iFood<\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:800;font-family:Poppins;color:#EA3A2E;margin-top:2px\">{{ h.ifoodFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:8px;margin-top:12px\">\n            <button onclick=\"{{ h.onLoad }}\" style=\"flex:1;background:#E24A8B;color:#fff;border:none;border-radius:12px;padding:11px;font-size:13.5px;font-weight:700;font-family:Poppins;cursor:pointer\">Abrir e editar<\u002Fbutton>\n            <button onclick=\"{{ h.onPdf }}\" style=\"background:#fff;color:#C0286B;border:1.5px solid #E7B9CE;border-radius:12px;padding:11px 14px;font-size:13.5px;font-weight:700;font-family:Poppins;cursor:pointer\">⬇ PDF<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== AJUDA / CHAT ===================== -->\n    <sc-if value=\"{{ isAjuda }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"animation:ca-fade .25s ease\">\n      <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin:2px 2px 14px\">\n        <div>\n          <div style=\"font-family:Poppins;font-weight:700;font-size:22px;letter-spacing:-.3px\">Tira-dúvidas<\u002Fdiv>\n          <div style=\"font-size:13px;color:#9B8590;margin-top:1px\">Sua assistente de confeitaria, a qualquer hora<\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ chatTem }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ onClearChat }}\" style=\"flex:none;background:#FCE3EC;color:#C0286B;border:none;border-radius:11px;padding:8px 12px;font-size:12.5px;font-weight:700;font-family:Poppins;cursor:pointer;white-space:nowrap\">↺ Limpar<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ chatVazio }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"background:#fff;border:1px solid #F6E2EA;border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(192,40,107,.05);margin-bottom:12px\">\n          <div style=\"font-family:Poppins;font-weight:700;font-size:15px;color:#C0286B;margin-bottom:4px\">Oi, eu sou a Aya 🍰<\u002Fdiv>\n          <div style=\"font-size:13.5px;color:#6E5862;line-height:1.55\">Me pergunte qualquer coisa sobre preço, lucro, custos ou como usar o app. Toque numa sugestão:<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;margin-top:14px\">\n            <sc-for list=\"{{ sugestoes }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ s.onPick }}\" style=\"text-align:left;background:#FBF1F6;border:1px solid #F3DDE7;border-radius:13px;padding:11px 13px;font-size:13.5px;font-weight:600;color:#5C4651;cursor:pointer\" style-hover=\"background:#FCE3EC\">{{ s.text }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-for list=\"{{ mensagens }}\" as=\"m\" hint-placeholder-count=\"0\">\n        <div style=\"display:flex;justify-content:{{ m.justify }};margin-bottom:10px;animation:ca-pop .2s ease\">\n          <div style=\"max-width:82%;background:{{ m.bg }};color:{{ m.color }};border:{{ m.border }};border-radius:16px;padding:11px 14px;font-size:14px;line-height:1.5;font-weight:500;white-space:pre-wrap;border-bottom-right-radius:{{ m.brr }};border-bottom-left-radius:{{ m.blr }}\">{{ m.text }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <sc-if value=\"{{ chatLoading }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:flex;justify-content:flex-start;margin-bottom:10px\">\n          <div style=\"background:#fff;border:1px solid #F1D7E2;border-radius:16px;border-bottom-left-radius:5px;padding:13px 16px;display:flex;gap:5px\">\n            <span style=\"width:7px;height:7px;border-radius:50%;background:#E24A8B;animation:ca-blink 1.2s infinite\"><\u002Fspan>\n            <span style=\"width:7px;height:7px;border-radius:50%;background:#E24A8B;animation:ca-blink 1.2s infinite .2s\"><\u002Fspan>\n            <span style=\"width:7px;height:7px;border-radius:50%;background:#E24A8B;animation:ca-blink 1.2s infinite .4s\"><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <!-- CHAT INPUT BAR (only ajuda) -->\n  <sc-if value=\"{{ isAjuda }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;left:50%;transform:translateX(-50%);bottom:66px;width:100%;max-width:440px;padding:8px 12px;background:linear-gradient(#FBEEF3cc,#FBEEF3);backdrop-filter:blur(4px);z-index:25\">\n      <div style=\"display:flex;align-items:flex-end;gap:8px;background:#fff;border:1.5px solid #F1D7E2;border-radius:22px;padding:6px 6px 6px 14px;box-shadow:0 4px 14px rgba(192,40,107,.08)\">\n        <input value=\"{{ chat d = 0;\n    this.BASE_INSUMOS = this.buildBase();\n    this.state = {\n      screen: 'precificar',\n      recNome: 'Bolo de cenoura',\n      recRendimento: '1 bolo (~12 fatias)',\n      tempoMin: '40',\n      rendimentoQtd: '12',\n      partes: [\n        { id: this.nid(), nome: 'Massa do bolo', insumos: [\n          this.ins('Farinha de trigo','KG',5,0.24),\n          this.ins('Fermento em pó','KG',50,0.012),\n          this.ins('Chocolate em pó','KG',35,0.1),\n          this.ins('Leite em pó','KG',15,0.02),\n          this.ins('Açúcar refinado','KG',5,0.35),\n          this.ins('Óleo de soja','L',7,0.16),\n          this.ins('Ovo','UND',0.3,3),\n          this.ins('Cenoura','KG',7,0.35),\n          this.ins('Iogurte natural','L',12,0.1),\n        ]},\n        { id: this.nid(), nome: 'Calda', insumos: [\n          this.ins('Cobertura fracionada','KG',35,0.2),\n          this.ins('Leite integral','L',4.5,0.1),\n          this.ins('Glucose de milho','KG',5,0.02),\n          this.ins('Manteiga sem sal','KG',30,0.03),\n          this.ins('Açúcar refinado','KG',5,0.02),\n        ]},\n      ],\n      // ajustes globais\n      cfgSalario: '1.800,00',\n      cfgDias: '24',\n      cfgHoras: '8',\n      operacionalPct: '30',\n      lucroPct: '50',\n      cfgTaxaIfood: String(props && props.taxaIfoodPadrao != null ? props.taxaIfoodPadrao : 27).replace('.',','),\n      taxaInput: String(props && props.taxaIfoodPadrao != null ? props.taxaIfoodPadrao : 27).replace('.',','),\n      modal: null,\n      historico: [],\n      toast: '',\n      toastMsg: '',\n      chat: [],\n      chatInput: '',\n      chatLoading: false,\n    };\n  }\n\n  buildBase(){\n    const list = [\n      // Farinhas, amidos e secos\n      'Farinha de trigo','Farinha de trigo integral','Farinha de rosca','Farinha de amêndoas','Farinha de aveia','Amido de milho (maisena)','Fubá','Polvilho doce','Polvilho azedo','Aveia em flocos','Farinha de coco','Farinha de mandioca','Tapioca (goma)',\n      // Açúcares e adoçantes\n      'Açúcar refinado','Açúcar cristal','Açúcar de confeiteiro','Açúcar mascavo','Açúcar demerara','Adoçante culinário','Mel','Glucose de milho','Açúcar invertido','Melaço','Xarope de milho',\n      // Fermentos e químicos\n      'Fermento em pó','Fermento biológico seco','Fermento biológico fresco','Bicarbonato de sódio','Cremor de tártaro','Gelatina em pó incolor','Gelatina sem sabor','Ágar-ágar','Emulsificante','CMC','Pectina',\n      // Laticínios e ovos\n      'Leite integral','Leite desnatado','Leite em pó','Leite condensado','Creme de leite','Creme de leite fresco','Leite de coco','Iogurte natural','Manteiga sem sal','Manteiga com sal','Margarina','Requeijão','Cream cheese','Queijo minas','Queijo mussarela','Queijo parmesão','Ricota','Ovo','Clara de ovo','Gema de ovo','Chantilly','Chantininho','Doce de leite',\n      // Chocolates e cacau\n      'Chocolate em pó','Cacau em pó','Chocolate ao leite','Chocolate meio amargo','Chocolate branco','Chocolate granulado','Cobertura fracionada','Chocolate em gotas','Nutella','Achocolatado','Ganache',\n      // Gorduras e óleos\n      'Óleo de soja','Óleo de girassol','Óleo de coco','Azeite de oliva','Gordura vegetal','Banha',\n      // Frutas\n      'Banana','Maçã','Morango','Abacaxi','Laranja','Limão','Maracujá','Uva','Manga','Mamão','Coco ralado','Coco fresco','Ameixa seca','Uva passa','Damasco seco','Cereja','Framboesa','Mirtilo','Kiwi','Pêssego','Goiaba','Figo','Cenoura','Beterraba','Abóbora',\n      // Castanhas e sementes\n      'Castanha de caju','Castanha do pará','Amêndoas','Nozes','Avelã','Amendoim','Pistache','Macadâmia','Semente de chia','Linhaça','Gergelim','Granola',\n      // Sabores, essências e especiarias\n      'Essência de baunilha','Essência de morango','Extrato de baunilha','Canela em pó','Canela em pau','Cravo','Noz-moscada','Gengibre','Erva-doce','Raspas de limão','Raspas de laranja','Café solúvel','Café coado','Rum','Licor','Vinho','Corante alimentício','Sal',\n      // Confeitos e decoração\n      'Confeitos coloridos','Granulado','Confete','Pasta americana','Glacê real','Marshmallow','Paçoca','Bala de goma','Flores comestíveis','Papel arroz','Pó dourado',\n      // Salgados / massas\n      'Fermento químico','Queijo ralado','Presunto','Frango desfiado','Milho verde','Ervilha','Azeitona','Cebola','Alho','Tomate','Orégano','Molho de tomate','Catupiry','Bacon','Calabresa','Batata','Trigo para quibe',\n      // Embalagens e descartáveis\n      'Embalagem (caixa)','Caixa para bolo','Forma de papel','Forminha de doce','Saco celofane','Fita decorativa','Tag / etiqueta','Colher descartável','Pote plástico','Cinta para bolo','Papel manteiga','Forma de alumínio',\n    ];\n    // unidade padrão sugerida por insumo\n    const undItems = new Set(['Ovo','Clara de ovo','Gema de ovo','Banana','Maçã','Laranja','Limão','Manga','Mamão','Coco fresco','Kiwi','Pêssego','Goiaba','Figo','Canela em pau','Cravo','Embalagem (caixa)','Caixa para bolo','Forma de papel','Forminha de doce','Saco celofane','Fita decorativa','Tag / etiqueta','Colher descartável','Pote plástico','Cinta para bolo','Forma de alumínio']);\n    const litroItems = new Set(['Leite integral','Leite desnatado','Leite condensado','Creme de leite','Creme de leite fresco','Leite de coco','Iogurte natural','Óleo de soja','Óleo de girassol','Óleo de coco','Azeite de oliva','Mel','Glucose de milho','Molho de tomate','Rum','Licor','Vinho','Essência de baunilha','Essência de morango','Extrato de baunilha','Corante alimentício','Achocolatado','Nutella']);\n    return list.map(nome=>({ nome, unidade: undItems.has(nome)?'UND':(litroItems.has(nome)?'L':'KG') }));\n  }\n\n  nid(){ this._uid++; return 'x'+this._uid+'_'+Math.random().toString(36).slice(2,6); }\n  ins(nome,unidade,preco,qntd){ return { id:this.nid(), nome, unidade, preco, qntd }; }\n\n  componentDidMount(){\n    try{\n      const raw = localStorage.getItem('ca_precificacao_hist_v1');\n      if(raw) this.setState({ historico: JSON.parse(raw) });\n      const cfg = localStorage.getItem('ca_precificacao_cfg_v1');\n      if(cfg){ const c=JSON.parse(cfg); const patch={ cfgSalario:c.cfgSalario, cfgDias:c.cfgDias, cfgHoras:c.cfgHoras, operacionalPct:c.operacionalPct, lucroPct:c.lucroPct }; if(c.cfgTaxaIfood!=null){ patch.cfgTaxaIfood=c.cfgTaxaIfood; patch.taxaInput=c.cfgTaxaIfood; } this.setState(patch); }\n    }catch(e){}\n  }\n  persist(h){ try{ localStorage.setItem('ca_precificacao_hist_v1', JSON.stringify(h)); }catch(e){} }\n  persistCfg(patch){\n    this.setState(patch);\n    try{\n      const s=this.state, c={ ...{cfgSalario:s.cfgSalario,cfgDias:s.cfgDias,cfgHoras:s.cfgHoras,operacionalPct:s.operacionalPct,lucroPct:s.lucroPct,cfgTaxaIfood:s.cfgTaxaIfood}, ...patch };\n      localStorage.setItem('ca_precificacao_cfg_v1', JSON.stringify(c));\n    }catch(e){}\n  }\n\n  // ---------- helpers ----------\n  toNum(v){ if(typeof v==='number') return v; const n=parseFloat(String(v==null?'':v).replace(/\\./g,'').replace(',','.')); return isFinite(n)?n:0; }\n  toNumDec(v){ if(typeof v==='number') return v; const n=parseFloat(String(v==null?'':v).replace(',','.')); return isFinite(n)?n:0; }\n  brl(n){ if(!isFinite(n)) n=0; return 'R$ ' + n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }\n  num(n){ return Number(n).toLocaleString('pt-BR',{maximumFractionDigits:3}); }\n  uLabel(u){ return u==='KG'?'kg':(u==='L'?'litro':'unidade'); }\n  custoParte(p){ return (p.insumos||[]).reduce((s,i)=>s + (Number(i.preco)||0)*(Number(i.qntd)||0), 0); }\n  custoInsumos(){ return this.state.partes.reduce((s,p)=>s+this.custoParte(p),0); }\n  valorMinuto(){ const sal=this.toNum(this.state.cfgSalario), d=this.toNum(this.state.cfgDias), h=this.toNum(this.state.cfgHoras); if(d<=0||h<=0) return 0; return (sal/d/h)/60; }\n  maoObra(){ return this.valorMinuto()*this.toNum(this.state.tempoMin); }\n  custoFixo(){ return this.custoInsumos()*this.toNumDec(this.state.operacionalPct)/100; }\n  custoTotalRec(){ return this.custoInsumos()+this.custoFixo()+this.maoObra(); }\n  lucroValor(){ return this.custoTotalRec()*this.toNumDec(this.state.lucroPct)/100; }\n  valorFinal(){ return this.custoTotalRec()+this.lucroValor(); }\n  rendQtd(){ const r=this.toNum(this.state.rendimentoQtd); return r>0?r:1; }\n  valorUnidade(){ return this.valorFinal()/this.rendQtd(); }\n  taxa(){ return this.toNumDec(this.state.taxaInput); }\n  precoIfood(){ const t=this.taxa(); if(t>=100) return Infinity; return this.valorUnidade()/(1-t/100); }\n\n  flash(msg){ this.setState({toast:msg,toastMsg:msg}); clearTimeout(this._t); this._t=setTimeout(()=>this.setState({toast:''}),2400); }\n\n  // ---------- recipe edits ----------\n  setPartes(fn){ this.setState(s=>({partes: fn(s.partes.map(p=>({...p, insumos:p.insumos.slice()})))})); }\n  addParte(){ this.setPartes(ps=>[...ps, {id:this.nid(), nome:'Nova parte', insumos:[]}]); }\n  delParte(idx){ this.setPartes(ps=> ps.length>1 ? ps.filter((_,i)=>i!==idx) : ps); }\n  renameParte(idx,v){ this.setPartes(ps=>{ ps[idx]={...ps[idx],nome:v}; return ps; }); }\n  novaReceita(){ this.setState({recNome:'', recRendimento:'', tempoMin:'30', rendimentoQtd:'1', partes:[{id:this.nid(),nome:'Ingredientes',insumos:[]}], taxaInput:this.state.cfgTaxaIfood}); this.flash('Pronto, ficha em branco!'); }\n\n  // ---------- modal + autocomplete ----------\n  openInsumo(parteIdx, insIdx){\n    const base = insIdx>=0 ? this.state.partes[parteIdx].insumos[insIdx] : {nome:'',unidade:'KG',preco:'',qntd:''};\n    this.setState({ modal:{ parteIdx, insIdx,\n      nome: base.nome,\n      unidade: base.unidade,\n      preco: insIdx>=0 ? String(base.preco).replace('.',',') : '',\n      qntd: insIdx>=0 ? String(base.qntd).replace('.',',') : '',\n      sugFocus:false,\n      calcOpen:false, cQtd:'', cUnidade:'g', cValor:'' } });\n  }\n  closeModal(){ this.setState({modal:null}); }\n  setM(patch){ this.setState(s=>({modal:{...s.modal, ...patch}})); }\n  norm(s){ return String(s||'').toLowerCase().normalize('NFD').replace(/[\\u0300-\\u036f]/g,''); }\n  sugList(){\n    const m=this.state.modal; if(!m||!m.sugFocus) return [];\n    const q=this.norm(m.nome).trim();\n    let arr = this.BASE_INSUMOS;\n    if(q.length>=1){\n      const starts = arr.filter(x=>this.norm(x.nome).startsWith(q));\n      const has = arr.filter(x=>!this.norm(x.nome).startsWith(q) && this.norm(x.nome).includes(q));\n      arr = starts.concat(has);\n      // se já digitou exatamente um item, não precisa sugerir\n      if(arr.length===1 && this.norm(arr[0].nome)===q) return [];\n    }\n    return arr.slice(0,8);\n  }\n  pickSug(item){ this.setM({ nome:item.nome, unidade:item.unidade, sugFocus:false }); }\n  saveInsumo(){\n    const m=this.state.modal; if(!m) return;\n    if(!m.nome.trim() || this.toNumDec(m.preco)<=0 || this.toNumDec(m.qntd)<=0) return;\n    const obj={ nome:m.nome.trim(), unidade:m.unidade, preco:this.toNumDec(m.preco), qntd:this.toNumDec(m.qntd) };\n    this.setPartes(ps=>{ const p=ps[m.parteIdx]; if(m.insIdx>=0){ obj.id=p.insumos[m.insIdx].id; p.insumos[m.insIdx]=obj; } else { obj.id=this.nid(); p.insumos.push(obj); } return ps; });\n    this.closeModal();\n  }\n  deleteInsumo(){ const m=this.state.modal; if(!m||m.insIdx<0) return; this.setPartes(ps=>{ ps[m.parteIdx].insumos.splice(m.insIdx,1); return ps; }); this.closeModal(); }\n  delInsumoRow(parteIdx,insIdx){ this.setPartes(ps=>{ ps[parteIdx].insumos.splice(insIdx,1); return ps; }); }\n\n  calcResult(){\n    const m=this.state.modal; if(!m) return 0;\n    const q=this.toNumDec(m.cQtd), v=this.toNumDec(m.cValor); if(q<=0) return 0;\n    const u=m.cUnidade;\n    if(u==='g'||u==='ml') return v/q*1000;\n    return v/q;\n  }\n  applyCalc(){ const r=this.calcResult(); if(r<=0) return; this.setM({ preco:r.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}), calcOpen:false }); }\n\n  // ---------- history ----------\n  snapshot(){\n    return { id:this.nid(), nome:this.state.recNome||'Receita sem nome', rendimento:this.state.recRendimento,\n      partes: this.state.partes.map(p=>({nome:p.nome, insumos:p.insumos.map(i=>({...i}))})),\n      tempoMin:this.state.tempoMin, rendimentoQtd:this.state.rendimentoQtd,\n      operacionalPct:this.state.operacionalPct, lucroPct:this.state.lucroPct, taxaInput:this.state.taxaInput,\n      custoInsumos:this.custoInsumos(), custoFixo:this.custoFixo(), maoObra:this.maoObra(),\n      custoTotal:this.custoTotalRec(), lucro:this.lucroValor(), valorFinal:this.valorFinal(),\n      valorUnidade:this.valorUnidade(), ifood:this.precoIfood(), valorMinuto:this.valorMinuto(), ts:Date.now() };\n  }\n  salvar(){\n    if(this.custoInsumos()<=0){ this.flash('Adicione insumos primeiro 🙂'); return; }\n    const snap=this.snapshot();\n    const h=[snap, ...this.state.historico];\n    this.setState({historico:h}); this.persist(h); this.flash('Receita salva! ✓');\n  }\n  loadHist(item){\n    this.setState({ screen:'precificar', recNome:item.nome, recRendimento:item.rendimento||'',\n      tempoMin:item.tempoMin||'30', rendimentoQtd:item.rendimentoQtd||'1',\n      partes:item.partes.map(p=>({id:this.nid(), nome:p.nome, insumos:p.insumos.map(i=>({...i,id:this.nid()}))})),\n      operacionalPct:item.operacionalPct||this.state.operacionalPct, lucroPct:item.lucroPct||this.state.lucroPct,\n      taxaInput:item.taxaInput||this.state.taxaInput });\n    this.flash('Receita carregada');\n  }\n  delHist(id){ const h=this.state.historico.filter(x=>x.id!==id); this.setState({historico:h}); this.persist(h); }\n\n  // ---------- PDF ----------\n  buildPdfDoc(snap){\n    const rows = snap.partes.map(p=>{\n      const sub=p.insumos.reduce((s,i)=>s+(Number(i.preco)||0)*(Number(i.qntd)||0),0);\n      const items=p.insumos.map(i=>`<tr><td>${i.nome}<\u002Ftd><td style=\"text-align:center\">${this.num(i.qntd)} ${i.unidade}<\u002Ftd><td style=\"text-align:right\">${this.brl(Number(i.preco))}/${this.uLabel(i.unidade)}<\u002Ftd><td style=\"text-align:right;font-weight:700\">${this.brl((Number(i.preco)||0)*(Number(i.qntd)||0))}<\u002Ftd><\u002Ftr>`).join('');\n      return `<tr class=\"ph\"><td colspan=\"4\">${p.nome}<\u002Ftd><\u002Ftr>${items}<tr class=\"sub\"><td colspan=\"3\" style=\"text-align:right\">Subtotal<\u002Ftd><td style=\"text-align:right\">${this.brl(sub)}<\u002Ftd><\u002Ftr>`;\n    }).join('');\n    const line=(l,v,strong)=>`<tr${strong?' class=\"tt\"':''}><td>${l}<\u002Ftd><td style=\"text-align:right\">${v}<\u002Ftd><\u002Ftr>`;\n    return `<!doctype html><html lang=\"pt-BR\"><head><meta charset=\"utf-8\"><base href=\"${location.href}\"><title>${snap.nome} — Ficha técnica<\u002Ftitle>\n    <style>\n      *{box-sizing:border-box} body{font-family:Nunito,Arial,sans-serif;color:#33262D;margin:0;padding:34px 38px}\n      .hd{display:flex;align-items:center;gap:16px;border-bottom:3px solid #E24A8B;padding-bottom:14px;margin-bottom:18px}\n      .hd img{height:48px}\n      h1{font-size:21px;margin:0;color:#C0286B}\n      .meta{color:#8A6E7B;font-size:13px;margin-top:3px}\n      h2{font-size:13px;color:#A81E5E;text-transform:uppercase;letter-spacing:.5px;margin:24px 0 6px}\n      table{width:100%;border-collapse:collapse;font-size:13px}\n      td{padding:7px 6px;border-bottom:1px solid #F1D7E2}\n      .ph td{background:#FCE3EC;font-weight:800;color:#A81E5E;text-transform:uppercase;font-size:12px;letter-spacing:.4px}\n      .sub td{font-weight:800;color:#5C4651;border-bottom:2px solid #E7B9CE}\n      .calc td{font-size:14px}\n      .calc .tt td{font-weight:800;color:#A81E5E;border-top:2px solid #E7B9CE;border-bottom:none;font-size:15px}\n      .final{margin-top:18px;display:flex;gap:12px}\n      .box{flex:1;border-radius:12px;padding:13px 15px}\n      .box .l{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.4px}\n      .box .v{font-size:22px;font-weight:800;margin-top:4px}\n      .ft{margin-top:26px;color:#A7919C;font-size:11px;text-align:center}\n      @media print{body{padding:18px 22px}}\n    <\u002Fstyle><\u002Fhead><body>\n      <div class=\"hd\"><img src=\"${(window.__resources&&window.__resources.logo)||'assets/logo-camila-ayana.png'}\" alt=\"\"><div><h1>${snap.nome}<\u002Fh1><div class=\"meta\">${snap.rendimento?snap.rendimento+' &nbsp;·&nbsp; ':''}Rende ${this.num(this.toNum(snap.rendimentoQtd)||1)} und &nbsp;·&nbsp; ${this.num(this.toNum(snap.tempoMin))} min &nbsp;·&nbsp; ${new Date(snap.ts).toLocaleDateString('pt-BR')}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <table><thead><tr style=\"color:#B98AA1;font-size:11px;text-transform:uppercase\"><td>Insumo<\u002Ftd><td style=\"text-align:center\">Qtd<\u002Ftd><td style=\"text-align:right\">Preço<\u002Ftd><td style=\"text-align:right\">Custo<\u002Ftd><\u002Ftr><\u002Fthead><tbody>${rows}<\u002Ftbody><\u002Ftable>\n      <h2>Cálculo do preço<\u002Fh2>\n      <table class=\"calc\">\n        ${line('Custo dos insumos', this.brl(snap.custoInsumos))}\n        ${line('Custo operacional ('+snap.operacionalPct+'%)', this.brl(snap.custoFixo))}\n        ${line('Mão de obra ('+this.num(this.toNum(snap.tempoMin))+' min × '+this.brl(snap.valorMinuto)+'/min)', this.brl(snap.maoObra))}\n        ${line('Custo total', this.brl(snap.custoTotal), true)}\n        ${line('Lucro ('+snap.lucroPct+'%)', this.brl(snap.lucro))}\n      <\u002Ftable>\n      <div class=\"final\">\n        <div class=\"box\" style=\"background:#FCE3EC\"><div class=\"l\" style=\"color:#B5658C\">Valor final da receita<\u002Fdiv><div class=\"v\" style=\"color:#E24A8B\">${this.brl(snap.valorFinal)}<\u002Fdiv><\u002Fdiv>\n        <div class=\"box\" style=\"background:#F4ECF0\"><div class=\"l\" style=\"color:#8A6E7B\">Preço por unidade<\u002Fdiv><div class=\"v\" style=\"color:#A81E5E\">${this.brl(snap.valorUnidade)}<\u002Fdiv><\u002Fdiv>\n        <div class=\"box\" style=\"background:#FDEDEC\"><div class=\"l\" style=\"color:#D06A60\">Unidade no iFood (${snap.taxaInput}%)<\u002Fdiv><div class=\"v\" style=\"color:#EA3A2E\">${isFinite(snap.ifood)?this.brl(snap.ifood):'—'}<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ft\">Camila Ayana · Escola de Confeitaria — gerado pelo App de Precificação<\u002Fdiv>\n    <\u002Fbody><\u002Fhtml>`;\n  }\n  abrirPdf(snap){\n    const w=window.open('','_blank');\n    if(!w){ this.flash('Permita pop-ups para baixar o PDF'); return; }\n    w.document.write(this.buildPdfDoc(snap));\n    w.document.close();\n    setTimeout(()=>{ try{ w.focus(); w.print(); }catch(e){} }, 600);\n  }\n\n  // ---------- chat ----------\n  setChatInput(v){ this.setState({chatInput:v}); }\n  pushMsg(role,text){ this.setState(s=>({chat:[...s.chat,{id:this.nid(),role,text}]})); }\n  async sendChat(textArg){\n    const text=(textArg!=null?textArg:this.state.chatInput).trim();\n    if(!text || this.state.chatLoading) return;\n    this.pushMsg('user',text);\n    this.setState({chatInput:'', chatLoading:true});\n    const ctx = `Receita atual: \"${this.state.recNome||'(sem nome)'}\". Custo dos insumos ${this.brl(this.custoInsumos())}, custo operacional ${this.state.operacionalPct}% (${this.brl(this.custoFixo())}), mão de obra ${this.brl(this.maoObra())} (${this.toNum(this.state.tempoMin)} min × ${this.brl(this.valorMinuto())}/min), custo total ${this.brl(this.custoTotalRec())}, lucro ${this.state.lucroPct}% (${this.brl(this.lucroValor())}), valor final ${this.brl(this.valorFinal())}, rende ${this.rendQtd()} und = ${this.brl(this.valorUnidade())}/unidade, taxa iFood ${this.state.taxaInput}%.`;\n    const prompt = `Você é a \"Aya\", assistente da Escola de Confeitaria Camila Ayana, dentro de um app de precificação usado por confeiteiras iniciantes (leigas, no celular). Responda em português do Brasil, calorosa, curta e prática (no máximo 4 frases ou lista curta). O app calcula o preço assim: custo total = custo dos insumos + custo operacional (% sobre os insumos) + mão de obra (valor do minuto × tempo de preparo); valor final = custo total + lucro (% sobre o custo total); preço por unidade = valor final ÷ rendimento; preço no iFood = preço da unidade ÷ (1 − taxa%). O valor do minuto vem dos Ajustes (salário desejado ÷ dias ÷ horas ÷ 60). ${ctx}\\n\\nPergunta da confeiteira: ${text}`;\n    try{\n      if(!(window.claude && window.claude.complete)) throw new Error('no-claude');\n      const resp = await window.claude.complete({ messages:[{role:'user', content:prompt}] });\n      this.pushMsg('assistant', (resp||'').trim() || this.fallback(text));\n    }catch(e){\n      this.pushMsg('assistant', this.fallback(text));\n    }\n    this.setState({chatLoading:false});\n  }\n  fallback(q){\n    const s=this.norm(q);\n    if(s.includes('mao de obra')||s.includes('minuto')||s.includes('meu tempo')||s.includes('salario'))\n      return 'A mão de obra vem dos Ajustes: seu salário desejado ÷ dias trabalhados ÷ horas por dia ÷ 60 = valor do minuto ('+this.brl(this.valorMinuto())+'). Multiplicamos pelo tempo da receita ('+this.toNum(this.state.tempoMin)+' min) = '+this.brl(this.maoObra())+'.';\n    if(s.includes('operacional')||s.includes('custo fixo')||s.includes('gas')||s.includes('luz')||s.includes('agua')||s.includes('energia'))\n      return 'O custo operacional cobre gás, luz, água e afins. É um % sobre os insumos (hoje '+this.state.operacionalPct+'%). Mude em Ajustes ou direto na ficha técnica.';\n    if(s.includes('lucro')||s.includes('margem'))\n      return 'O lucro é uma % sobre o custo total (insumos + operacional + mão de obra). Hoje está em '+this.state.lucroPct+'% = '+this.brl(this.lucroValor())+'. Iniciantes costumam usar entre 40% e 60%.';\n    if(s.includes('ifood')||s.includes('delivery')||s.includes('taxa'))\n      return 'No iFood o app desconta uma taxa. Dividimos o preço da unidade por (1 − taxa). Ex.: '+this.brl(this.valorUnidade())+' com '+this.state.taxaInput+'% vira '+this.brl(this.precoIfood())+'. Assim você recebe o valor cheio.';\n    if(s.includes('rendiment')||s.includes('unidade')||s.includes('fatia')||s.includes('porcao'))\n      return 'Coloque quantas unidades a receita rende no campo \"Rende\". Dividimos o valor final pelo rendimento pra achar o preço de cada unidade ('+this.brl(this.valorUnidade())+').';\n    if(s.includes('kg')||s.includes('preco por')||s.includes('calcul')||s.includes('pacote'))\n      return 'Na hora de lançar o insumo, toque em 🧮 e diga o tamanho da embalagem (ex.: 395g) e quanto pagou (ex.: R$5,00) que eu calculo o preço por kg pra você. 😊';\n    return 'Posso ajudar com insumos, custo operacional, mão de obra, lucro, rendimento e preço no iFood. Monte a ficha em Precificar e me pergunte o que quiser!';\n  }\n\n  renderVals(){\n    const s=this.state;\n    const PINK='#E24A8B', DEEP='#C0286B';\n    const mostrarIfood = !(this.props && this.props.mostrarIfood===false);\n\n    const partes = s.partes.map((p,pi)=>({\n      id:p.id, nome:p.nome, canDelete: s.partes.length>1,\n      subtotalFmt: this.brl(this.custoParte(p)),\n      onName:(e)=>this.renameParte(pi, e.target.value),\n      onDelete:(e)=>{ e.stopPropagation(); this.delParte(pi); },\n      onAddInsumo:()=>this.openInsumo(pi,-1),\n      insumos: p.insumos.map((it,ii)=>({\n        id:it.id, nome:it.nome,\n        detalhe: this.num(it.qntd)+' '+it.unidade+'  ·  '+this.brl(Number(it.preco))+'/'+this.uLabel(it.unidade),\n        custoFmt: this.brl((Number(it.preco)||0)*(Number(it.qntd)||0)),\n        onEdit:()=>this.openInsumo(pi,ii),\n        onDelete:(e)=>{ e.stopPropagation(); this.delInsumoRow(pi,ii); },\n      }))\n    }));\n\n    const taxasRapidas = ['12','15','20','23','27'].map(t=>{ const active=t===s.taxaInput; return { label:t, active,\n      bg: active?'#EA3A2E':'#FDEDEC', color: active?'#fff':'#D06A60', border: active?'#EA3A2E':'#F6D8D5',\n      onPick:()=>this.setState({taxaInput:t}) }; });\n    const cfgTaxasRapidas = ['12','15','20','23','27'].map(t=>{ const active=t===s.cfgTaxaIfood; return { label:t, active,\n      bg: active?'#EA3A2E':'#FDEDEC', color: active?'#fff':'#D06A60', border: active?'#EA3A2E':'#F6D8D5',\n      onPick:()=>this.persistCfg({cfgTaxaIfood:t}) }; });\n\n    // modal\n    const m=s.modal;\n    let modalVals={ modalOpen:false };\n    if(m){\n      const preco=this.toNumDec(m.preco), qntd=this.toNumDec(m.qntd);\n      const valid = m.nome.trim() && preco>0 && qntd>0;\n      const cr=this.calcResult();\n      const sug=this.sugList();\n      modalVals={ modalOpen:true,\n        modalTitle: m.insIdx>=0?'Editar insumo':'Novo insumo',\n        mNome:m.nome, mUnidade:m.unidade, mUnidadeLabel:this.uLabel(m.unidade),\n        mPreco:m.preco, mQntd:m.qntd,\n        mDica: qntd>0 ? ('= '+this.num(qntd)+' '+this.uLabel(m.unidade)+' nesta receita') : 'Quanto desse insumo entra em UMA receita.',\n        mCustoFmt: this.brl(preco*qntd),\n        mPodeExcluir: m.insIdx>=0,\n        mSaveLabel: m.insIdx>=0?'Salvar':'Adicionar',\n        mSaveBg: valid?PINK:'#E9CBD9', mSaveCursor: valid?'pointer':'not-allowed',\n        onMNome:(e)=>this.setM({nome:e.target.value, sugFocus:true}),\n        onMNomeFocus:()=>this.setM({sugFocus:true}),\n        onMNomeBlur:()=>{ setTimeout(()=>{ if(this.state.modal) this.setM({sugFocus:false}); }, 150); },\n        showSug: sug.length>0,\n        sugInsumos: sug.map(it=>({ nome:it.nome, onPick:(e)=>{ e.preventDefault(); this.pickSug(it); } })),\n        onMUnidade:(e)=>this.setM({unidade:e.target.value}),\n        onMPreco:(e)=>this.setM({preco:e.target.value}),\n        onMQntd:(e)=>this.setM({qntd:e.target.value}),\n        onMSave:()=>this.saveInsumo(),\n        onMDelete:()=>this.deleteInsumo(),\n        onMClose:()=>this.closeModal(),\n        calcOpen:!!m.calcOpen, calcLabel: m.calcOpen?'Fechar calculadora':'Não sei o preço por '+this.uLabel(m.unidade)+'? Calcular',\n        onToggleCalc:()=>this.setM({calcOpen:!m.calcOpen}),\n        cQtd:m.cQtd, cUnidade:m.cUnidade, cValor:m.cValor,\n        onCQtd:(e)=>this.setM({cQtd:e.target.value}),\n        onCUnidade:(e)=>this.setM({cUnidade:e.target.value}),\n        onCValor:(e)=>this.setM({cValor:e.target.value}),\n        calcResultFmt: this.brl(cr),\n        onApplyCalc:()=>this.applyCalc(),\n        stop:(e)=>e.stopPropagation(),\n      };\n    }\n\n    const historico = s.historico.map(h=>({\n      id:h.id, nome:h.nome,\n      meta: (h.rendimento?h.rendimento+'  ·  ':'') + new Date(h.ts).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}),\n      custoFmt:this.brl(h.custoTotal!=null?h.custoTotal:h.custo), unidadeFmt:this.brl(h.valorUnidade!=null?h.valorUnidade:h.venda), ifoodFmt: isFinite(h.ifood)?this.brl(h.ifood):'—',\n      onLoad:()=>this.loadHist(h), onDelete:()=>this.delHist(h.id), onPdf:()=>this.abrirPdf(h),\n    }));\n    const nH=s.historico.length;\n\n    const mensagens = s.chat.map(c=>{ const u=c.role==='user'; return { id:c.id, text:c.text, justify:u?'flex-end':'flex-start',\n      bg:u?PINK:'#fff', color:u?'#fff':'#33262D', border:u?'none':'1px solid #F1D7E2',\n      brr:u?'5px':'16px', blr:u?'16px':'5px' }; });\n    const sugestoes = ['Como funciona a mão de obra?','O que é custo operacional?','Como funciona o preço no iFood?','Comprei um pacote de 395g por R$5, qual o preço por kg?']\n      .map(t=>({text:t, onPick:()=>this.sendChat(t)}));\n\n    const rq=this.rendQtd();\n\n    return {\n      isPrec: s.screen==='precificar', isHist: s.screen==='historico', isAjuda: s.screen==='ajuda', isAjustes: s.screen==='ajustes',\n      navPrec: s.screen==='precificar'?PINK:'#C9B3BE', navHist: s.screen==='historico'?PINK:'#C9B3BE', navAjuda: s.screen==='ajuda'?PINK:'#C9B3BE', navAjustes: s.screen==='ajustes'?PINK:'#C9B3BE',\n      goPrec:()=>this.setState({screen:'precificar'}), goHist:()=>this.setState({screen:'historico'}), goAjuda:()=>this.setState({screen:'ajuda'}), goAjustes:()=>this.setState({screen:'ajustes'}),\n      goAjustesFromFicha:()=>this.setState({screen:'ajustes'}),\n\n      recNome:s.recNome, recRendimento:s.recRendimento,\n      onNome:(e)=>this.setState({recNome:e.target.value}),\n      onRendimento:(e)=>this.setState({recRendimento:e.target.value}),\n      onNovaReceita:()=>this.novaReceita(),\n\n      partes,\n      onAddParte:()=>this.addParte(),\n      custoInsumosFmt:this.brl(this.custoInsumos()),\n\n      tempoMin:s.tempoMin, tempoMinLabel:this.num(this.toNum(s.tempoMin)), onTempo:(e)=>this.setState({tempoMin:e.target.value}),\n      rendimentoQtd:s.rendimentoQtd, onRendQtd:(e)=>this.setState({rendimentoQtd:e.target.value}),\n      rendimentoLabel: 'rende '+this.num(rq)+(rq===1?' unidade':' unidades'),\n\n      operacionalPct:s.operacionalPct, onOperacional:(e)=>this.persistCfg({operacionalPct:e.target.value}),\n      lucroPct:s.lucroPct, onLucro:(e)=>this.persistCfg({lucroPct:e.target.value}),\n      custoFixoFmt:this.brl(this.custoFixo()),\n      maoObraFmt:this.brl(this.maoObra()),\n      custoTotalRecFmt:this.brl(this.custoTotalRec()),\n      lucroValorFmt:this.brl(this.lucroValor()),\n      valorFinalFmt:this.brl(this.valorFinal()),\n      valorUnidadeFmt:this.brl(this.valorUnidade()),\n\n      // ajustes\n      cfgSalario:s.cfgSalario, onCfgSalario:(e)=>this.persistCfg({cfgSalario:e.target.value}),\n      cfgDias:s.cfgDias, onCfgDias:(e)=>this.persistCfg({cfgDias:e.target.value}),\n      cfgHoras:s.cfgHoras, onCfgHoras:(e)=>this.persistCfg({cfgHoras:e.target.value}),\n      valorDiaFmt:this.brl((this.toNum(s.cfgDias)>0)?this.toNum(s.cfgSalario)/this.toNum(s.cfgDias):0),\n      valorHoraFmt:this.brl((this.toNum(s.cfgDias)>0&&this.toNum(s.cfgHoras)>0)?this.toNum(s.cfgSalario)/this.toNum(s.cfgDias)/this.toNum(s.cfgHoras):0),\n      valorMinutoFmt:this.brl(this.valorMinuto()),\n      cfgTaxaIfood:s.cfgTaxaIfood, onCfgTaxaIfood:(e)=>this.persistCfg({cfgTaxaIfood:e.target.value}),\n      cfgTaxasRapidas,\n\n      mostrarIfood,\n      taxasRapidas, taxaInput:s.taxaInput, onTaxa:(e)=>this.setState({taxaInput:e.target.value}),\n      precoIfoodFmt: isFinite(this.precoIfood())?this.brl(this.precoIfood()):'—',\n\n      onSalvar:()=>this.salvar(),\n      onBaixarPdf:()=>this.abrirPdf(this.snapshot()),\n\n      histVazio: nH===0,\n      histSubtitulo: nH===0?'Suas fichas salvas aparecem aqui':(nH+(nH===1?' receita salva':' receitas salvas')),\n      historico,\n\n      chatVazio: s.chat.length===0,\n      chatTem: s.chat.length>0,\n      onClearChat:()=>this.setState({chat:[], chatInput:'', chatLoading:false}),\n      mensagens, sugestoes,\n      chatInput:s.chatInput, onChatInput:(e)=>this.setChatInput(e.target.value),\n      onChatKey:(e)=>{ if(e.key==='Enter'){ e.preventDefault(); this.sendChat(); } },\n      onChatSend:()=>this.sendChat(),\n      chatLoading:s.chatLoading,\n\n      toast: !!s.toast, toastMsg:s.toastMsg,\n      ...modalVals,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"App de Precificacao Standalone.dc"}
